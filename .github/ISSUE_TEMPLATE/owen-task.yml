name: Owen Task
about: Autonomous engineering task for Owen
labels: [owner:owen, status:spec-ready]
title: "[TASK] "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for agent-executable work. Keep scope tight and testable.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What outcome do we need?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Bullet list, testable.
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: checkboxes
    id: spec_ready
    attributes:
      label: Spec Ready Checklist
      options:
        - label: Scope is clear and bounded
          required: true
        - label: Dependencies/assumptions are listed
          required: true
        - label: Acceptance criteria are measurable
          required: true

  - type: textarea
    id: files_expected
    attributes:
      label: Expected Files/Areas to Change
      description: List likely paths or components.
      placeholder: |
        - src/...
        - tests/...
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: Test Plan (required)
      description: Exact commands + expected result.
      placeholder: |
        - build command
        - test command
        - manual verification
    validations:
      required: true

  - type: checkboxes
    id: docs_impact
    attributes:
      label: Doc Impact
      options:
        - label: No docs update needed
        - label: README update required
        - label: API/OpenAPI docs update required
        - label: Architecture/plan docs update required

  - type: textarea
    id: constraints
    attributes:
      label: Constraints / Out of Scope
      description: Explicitly list what should NOT change.

  - type: textarea
    id: rollback
    attributes:
      label: Rollback Plan
      description: If this ships and causes issues, how do we safely revert?
      placeholder: Revert commit(s), disable feature flag, restore previous config.
    validations:
      required: true

  - type: textarea
    id: blockers
    attributes:
      label: Blocker Escalation Trigger
      description: What requires human decision before proceeding?

  - type: dropdown
    id: repo
    attributes:
      label: Repo
      options:
        - SageMiddleware
        - fomo-app
        - UAF-Auto
        - sitrep
        - compd
        - video-injest
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - low
        - medium
        - high
    validations:
      required: true
