# Cloudflare Named Tunnel Configuration Template
# Replace placeholder values before installing the cloudflared service.

# Example setup:
#   cloudflared tunnel login
#   cloudflared tunnel create uaf-middleware
#   cloudflared tunnel route dns uaf-middleware <PUBLIC_HOSTNAME>
#   cloudflared service install --config C:\UAF-Auto\.cloudflared\config.yml

tunnel: <TUNNEL-ID>
credentials-file: C:\Users\<WINDOWS-USER>\.cloudflared\<TUNNEL-ID>.json

ingress:
  - hostname: <PUBLIC_HOSTNAME>
    service: http://localhost:3000
  - service: http_status:404
